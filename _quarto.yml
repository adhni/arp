project:
  type: website
  output-dir: docs
  render:
  - "*.qmd"
  - "*.md"
  - "!long-map.qmd"

website:
  title: "Advanced R Programming"
  site-url: "https://adhni.github.io/arp/"
  navbar:
    background: "#0f4c81"
    left:
      - href: index.qmd
        text: Home
        icon: house-fill
      - text: Weekly schedule
        icon: calendar2-week-fill
        menu:
          - week1/index.qmd
          - week2/index.qmd
          - week3/index.qmd
          - week4/index.qmd
          - week5/index.qmd
          - week6/index.qmd
          - week7/index.qmd
          - week8/index.qmd
          - week9/index.qmd
          - week10/index.qmd
          - week11/index.qmd
          - week12/index.qmd
      - text: Assessments
        icon: clipboard-check-fill
        menu:
          - assignments/A1.qmd
          - assignments/A2.qmd
          - assignments/A3.qmd
          - assignments/discussion.qmd
      - text: Discussion
        icon: chat-fill
        href: "https://edstem.org/au/courses/31503/discussion/"
      - text: Moodle
        icon: mortarboard-fill
        href: "https://learning.monash.edu/course/view.php?id=40292&section=1"
      - text: Recordings
        icon: camera-video-fill
        href: "https://learning.monash.edu/mod/lti/view.php?id=5219874"
    right:
      - icon: github
        href: https://github.com/adhni/arp

date-format: "D MMMM YYYY"

freeze: auto

format:
  html:
    theme: cosmo
    css: numbat.css
    highlight: textmate
    toc: false
    mainfont: "Fira Sans"
    html-math-method: katex
    link-external-newwindow: true
    include-in-header:
      file: header.html

execute:
  echo: false
  message: false
  warning: false
  cache: false
